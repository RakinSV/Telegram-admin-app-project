# Быстрый деплой:
#   1) cp .env.example .env   (обязательно ДО первого запуска — bind mount
#      несуществующего файла .env заставит Docker создать на его месте
#      директорию, а не файл; заполнить .env можно и после через /setup)
#   2) заполнить .env реальными TG_API_ID/HASH/BOT_TOKEN/OWNER_ID/OPENAI_API_KEY
#      (либо оставить пустым и настроить позже через веб-визард /setup)
#   3) docker compose up -d --build
#
# WEBUI_MASTER_KEY/WEBUI_SESSION_SECRET сгенерируются автоматически при первом
# сохранении секрета и допишутся в этот же смонтированный .env — теряя volume
# с .env, теряешь возможность расшифровать секреты в БД (см. README/CLAUDE.md).

services:
  tg_repost:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Инфраструктурные переопределения, специфичные для Docker — приоритет
      # выше значений из .env (см. main.py::WEBUI_HOST/PORT).
      WEBUI_HOST: "0.0.0.0"
      WEBUI_PORT: "8000"
      DATABASE_URL: "sqlite:///db/tg_repost.db"
      # ОБЯЗАТЕЛЬНО совпадает со значением в сервисе guardian ниже — веб-
      # админка tg_repost читает БД Guardian напрямую (guardian_routes.py,
      # кросс-пакетный импорт), а не через сеть. Без этой строки процесс
      # tg_repost резолвит guardian.db по default-пути ("sqlite:///guardian.db"
      # относительно /app), а не в общем volume ./data/db — получается
      # ДРУГОЙ, немигрированный файл: /guardian, /guardian/settings,
      # /guardian/stopwords, /guardian/domains падают 500 "no such table"
      # (найдено на реальном деплое — было пропущено при добавлении Guardian
      # в docker-compose.yml).
      GUARDIAN_DATABASE_URL: "sqlite:///db/guardian.db"
    ports:
      # Публикуем ТОЛЬКО на loopback хоста — тот же localhost/VPN-only
      # периметр, что и при запуске без Docker (см. план Фазы 5, раздел
      # "Аутентификация"). Не открывать на 0.0.0.0 без reverse-proxy и
      # доп. укрепления.
      #
      # Порт вынесен в .env намеренно: он host-специфичен (на одном из
      # серверов 8000 занят посторонним контейнером, там стоит 8001). Раньше
      # это правилось прямо в этом файле — и первый же деплой, копирующий
      # docker-compose.yml из репозитория, молча возвращал 8000 и уводил
      # админку с привычного адреса.
      - "127.0.0.1:${WEBUI_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - ./.env:/app/.env
      - ./data/db:/app/db
      - ./data/logs:/app/logs
      - ./data/media:/app/media

  searxng:
    # Свой метапоисковик для добора источников (F16, SEARCH_PROVIDER=searxng).
    # Зачем свой, а не внешний API: бесплатен без оговорок — ни ключа, ни
    # аккаунта, ни квоты, — и позволяет выбрать, какие движки опрашивать
    # (SEARXNG_ENGINES), что решает случай «часть выдачи недоступна из сети
    # сервера». У Brave бесплатный тир закрыт для новых регистраций с февраля
    # 2026, поэтому дефолтный провайдер теперь этот.
    #
    # Порт НАРУЖУ не публикуется намеренно: ходит к нему только tg_repost по
    # внутренней compose-сети (http://searxng:8080). Открытый в интернет
    # SearXNG быстро становится чужим открытым прокси.
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    environment:
      # Должен совпадать с адресом, по которому его зовёт tg_repost.
      SEARXNG_BASE_URL: "http://searxng:8080/"
    volumes:
      # settings.yml генерируется при первом старте. ОБЯЗАТЕЛЬНО добавить в
      # него формат json, иначе API отвечает 403 (по умолчанию активен только
      # html):
      #   search:
      #     formats:
      #       - html
      #       - json
      # После правки: docker compose restart searxng
      - ./data/searxng:/etc/searxng

  guardian:
    # Отдельный бот от tg_repost (модерация группы, не публикация контента —
    # см. guardian/GUARDIAN.md), тот же образ, свой entrypoint/команда и своя
    # БД (GUARDIAN_DATABASE_URL) — независим от tg_repost, можно
    # останавливать/обновлять по отдельности.
    build: .
    entrypoint: ["./docker-entrypoint-guardian.sh"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GUARDIAN_DATABASE_URL: "sqlite:///db/guardian.db"
    volumes:
      - ./.env:/app/.env
      - ./data/db:/app/db
      - ./data/logs:/app/logs
