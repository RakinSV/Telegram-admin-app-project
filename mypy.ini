[mypy]

# Библиотеки без stub-пакетов/py.typed — раньше это тонуло сигналом
# ("Skipping analyzing...") в каждом прогоне mypy по всему проекту (guardian/
# использует apscheduler+telethon, tg_repost — telethon+passlib), заглушая
# реальные ошибки типов. Явный ignore_missing_imports здесь — не заглушка
# реальных проблем, а признание факта, что у этих пакетов просто нет
# type stubs в PyPI (нет .pyi/py.typed).
[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-telethon.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True
