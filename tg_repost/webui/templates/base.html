<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}tg_repost admin{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="brand">tg_repost</div>
      <a href="/">Дашборд</a>
      <a href="/sources">Источники</a>
      <a href="/targets">Цели</a>
      <a href="/moderation">Модерация</a>
      <a href="/ads">Реклама</a>
      <a href="/telethon-sessions">Telethon-сессии</a>
      <a href="/stats">Статистика</a>
      <a href="/components">Компоненты</a>
      <a href="/settings">Настройки</a>
      <a href="/secrets">Секреты</a>
      <a href="/audit">Журнал изменений</a>
      <a href="/logs">Логи</a>
      <div class="brand" style="margin-top: 20px;">Guardian</div>
      <a href="/guardian">Дашборд</a>
      <a href="/guardian/settings">Настройки</a>
      <a href="/guardian/stopwords">Стоп-слова</a>
      <a href="/guardian/domains">Whitelist доменов</a>
      <a href="/guardian/trusted">Исключения</a>
      <form method="post" action="/logout" style="margin-top: 20px;">
        <button type="submit" class="secondary">Выйти</button>
      </form>
    </nav>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
