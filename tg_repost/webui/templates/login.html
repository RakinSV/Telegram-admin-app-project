{% extends "auth_base.html" %}
{% block title %}{{ t('login.title') }} — tg_repost admin{% endblock %}
{% block content %}
<div class="auth-page">
  <h1>{{ t('login.title') }}</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="password" name="password" placeholder="{{ t('login.password_placeholder') }}" required autofocus>
    <input type="submit" value="{{ t('login.submit') }}">
  </form>
</div>
{% endblock %}
