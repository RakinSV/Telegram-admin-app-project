name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: ruff check
        run: ruff check tg_repost guardian

      - name: mypy
        run: mypy tg_repost guardian

      - name: pytest
        run: pytest

      - name: bandit (baseline в pyproject.toml)
        run: bandit -r tg_repost guardian -c pyproject.toml

      - name: pip-audit
        run: pip-audit -r requirements.txt
